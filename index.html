<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>裝備清單小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 基礎設定 */
        body {
            background-color: #cbd5e1; 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: #1e293b;
            /* 修改：改為固定高度並隱藏全域捲動，讓捲動發生在手機窗格內 */
            height: 100dvh;
            overflow: hidden;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* iOS 安全邊距 */
        .pt-safe { padding-top: max(1rem, env(safe-area-inset-top)); }
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        .mb-safe { margin-bottom: max(1rem, env(safe-area-inset-bottom)); }

        /* 雜誌架 3D 與材質設定 */
        .wood-rack {
            background-color: #ffffff; /* 改為純白底色 */
        }
        .wood-shelf {
            /* 模擬木板的厚度與陰影 */
            background: linear-gradient(to bottom, #d2bba3, #b89d81);
            border-bottom: 12px solid #a38568;
            box-shadow: 0 12px 15px -4px rgba(0,0,0,0.25), inset 0 2px 4px rgba(255,255,255,0.3);
            position: relative;
        }
        .wood-shelf::before {
            /* 層架背面的微陰影，增加立體感 */
            content: '';
            position: absolute;
            top: -20px; left: 0; right: 0; height: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.08), transparent);
            pointer-events: none;
        }
        .magazine-item {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: bottom center;
        }
        .magazine-item:active {
            transform: scale(0.96) translateY(2px);
        }
        
        /* 頁面切換動畫 */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex justify-center items-start">

    <!-- 📱 核心：強制手機比例窗格 (修改：加入 id 並改為內部捲動 overflow-y-auto) -->
    <div id="app-container" class="w-full max-w-[430px] bg-white h-full relative shadow-[0_0_40px_rgba(0,0,0,0.15)] sm:border-x sm:border-gray-200 flex flex-col overflow-y-auto overflow-x-hidden">

        <!-- 置頂標題 -->
        <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-xl border-b border-gray-100 shadow-sm pt-safe w-full flex-none">
            <div class="px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <!-- 新增：返回按鈕 (首頁時隱藏) -->
                    <button id="back-btn" class="hidden w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center hover:bg-gray-200 active:scale-95 transition">
                        <i class="fas fa-chevron-left text-sm"></i>
                    </button>
                    
                    <h1 class="text-xl font-extrabold text-[#3643ba] tracking-tight flex items-center gap-2">
                        <div class="bg-[#3643ba] text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-md">
                            <i class="fas fa-mountain text-sm"></i>
                        </div>
                        <span id="header-title">裝備清單小幫手</span>
                    </h1>
                </div>

                <!-- 右上角資訊按鈕 -->
                <button id="show-info-btn" class="w-8 h-8 rounded-full bg-gray-50 text-gray-400 border border-gray-200 hover:bg-gray-100 hover:text-[#3643ba] active:scale-95 flex items-center justify-center transition shadow-sm">
                    <i class="fas fa-info"></i>
                </button>
            </div>

            <!-- 新增：將分類選單移至 header 內，這樣就能跟標題一起凍結在最上方 -->
            <nav id="sticky-nav" class="hidden w-full px-2 pb-3 transition-all duration-300">
                <div class="flex gap-2 overflow-x-auto no-scrollbar px-2 snap-x" id="category-tabs">
                    <!-- 標籤會由 JS 動態生成 -->
                </div>
            </nav>
        </header>

        <!-- 📚 視圖 1：雜誌架主頁面 -->
        <main id="home-view" class="flex-1 wood-rack pb-6 w-full flex flex-col">
            <!-- 裝飾性頂部 -->
            <div class="w-full pt-6 pb-2 text-center text-[#8a7258] font-bold text-sm tracking-widest opacity-60">
                請點選你要找的裝備清單
            </div>
            
            <!-- 雜誌架容器 (動態生成) -->
            <div id="rack-container" class="w-full px-4 flex flex-col mt-2 flex-1">
                <!-- 由 JS 動態生成層架與雜誌 -->
            </div>

            <!-- 頁尾：累積造訪次數 (移至雜誌架頁面內) -->
            <footer class="w-full py-4 flex-none mt-auto">
                <div class="flex justify-center items-center gap-1.5 text-xs text-gray-400 font-medium tracking-wide">
                    <span>累積造訪</span>
                    <!-- hitwebcounter Code START -->
                    <a href="https://www.hitwebcounter.com/character-counter" target="_blank" rel="noopener" title="https://www.hitwebcounter.com/character-counter" class="flex items-center hover:opacity-80 transition-opacity">
                        <img src="https://www.hitwebcounter.com/counter/counter.php?page=21504513&amp;style=0007&amp;nbdigits=7&amp;type=page" alt="hitwebcounter" decoding="async" class="h-[16px] w-auto object-contain" />
                    </a>
                    <!-- hitwebcounter Code END -->
                    <span>次</span>
                </div>
            </footer>
        </main>

        <!-- 📋 視圖 2：清單詳細頁面 (預設隱藏) -->
        <main id="detail-view" class="hidden flex-1 w-full bg-white flex flex-col pb-10">
            <div class="w-full px-4 mt-5 flex-1">
                <div class="flex items-center justify-between mb-5 px-1">
                    <h2 id="current-category-title" class="text-xl font-bold text-gray-800"></h2>
                    <span class="text-[10px] sm:text-xs text-[#3643ba] bg-[#3643ba]/10 px-2.5 py-1 rounded-full font-medium shrink-0">長按圖片即可儲存</span>
                </div>

                <!-- 圖片展示網格 -->
                <div id="image-gallery" class="grid grid-cols-1 gap-5">
                    <!-- 圖片會由 JS 動態生成 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 💡 資訊提示彈窗 -->
    <div id="info-modal" class="fixed inset-0 z-[60] hidden flex-col items-center justify-center bg-transparent">
        <div id="info-backdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
        <div id="info-content" class="w-[85%] max-w-[320px] bg-white rounded-[24px] shadow-2xl p-6 flex flex-col items-center text-center relative z-10 transform scale-95 opacity-0 transition-all duration-300">
            <div class="w-14 h-14 bg-blue-50 text-[#3643ba] rounded-full flex items-center justify-center text-2xl mb-4 shadow-sm border border-blue-100">
                <i class="fas fa-lightbulb"></i>
            </div>
            <h3 class="text-[18px] font-bold text-gray-800 mb-2">使用提示</h3>
            <p class="text-[14px] text-gray-500 mb-6 leading-relaxed">
                在首頁的<span class="font-bold text-[#8a7258]">雜誌架</span>挑選分類，<br>
                進入後找到想下載的清單，<br>
                <span class="font-bold text-[#3643ba]">長按圖片</span>即可儲存清單喔！
            </p>
            <button id="close-info-btn" class="w-full bg-[#3643ba] text-white font-bold py-3.5 rounded-xl hover:bg-blue-800 transition active:scale-95 shadow-md text-[15px]">
                好，我了解了
            </button>
        </div>
    </div>

    <script>
        // --- 1. 資料設定 ---
        const equipmentData = [
            { id: 'walking', name: '行腳裝備', images: ['https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E8%A1%8C%E8%85%B3%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis.jpeg'] },
            { id: 'hiking', name: '健行裝備', images: ['https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E5%81%A5%E8%A1%8C%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis.jpeg'] },
            { id: 'mountaineering', name: '登山裝備', images: [
                'https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E7%99%BB%E5%B1%B1%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis-1.jpeg',
                'https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E7%99%BB%E5%B1%B1%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis-2.jpeg'
            ] },
            { id: 'snow', name: '雪季裝備', images: ['https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E9%9B%AA%E5%AD%A3%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Melody.jpeg'] },
            { id: 'fuji', name: '富士山裝備', images: [
                'https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E5%AF%8C%E5%A3%AB%E5%B1%B1%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis-1.jpeg',
                'https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E5%AF%8C%E5%A3%AB%E5%B1%B1%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis-2.jpeg'
            ] },
            { id: 'camping', name: '露營裝備', images: ['https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E9%9C%B2%E7%87%9F%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Louis.jpeg'] },
            { id: 'running', name: '路跑裝備', images: ['https://storage.hash.cloud/KmqWx4hUJsdMU9YNSMxWlWMnXzr2/DKTBADGE1//%EF%BC%88%E9%9B%BB%EF%BC%89%E8%B7%AF%E8%B7%91%E8%A3%9D%E5%82%99%E6%B8%85%E5%96%AE%20by%20Moco.jpeg'] }
        ];

        let currentCategory = equipmentData[0].id;

        // --- 2. 視圖切換與元件控制 ---
        const homeView = document.getElementById('home-view');
        const detailView = document.getElementById('detail-view');
        const backBtn = document.getElementById('back-btn');
        const headerTitle = document.getElementById('header-title');
        const stickyNav = document.getElementById('sticky-nav'); // 新增膠囊選單容器
        
        const rackContainer = document.getElementById('rack-container');
        const tabsContainer = document.getElementById('category-tabs');
        const galleryContainer = document.getElementById('image-gallery');
        const titleElement = document.getElementById('current-category-title');

        // 切換到首頁 (雜誌架)
        function showHome() {
            homeView.classList.remove('hidden');
            homeView.classList.add('fade-in');
            detailView.classList.add('hidden');
            backBtn.classList.add('hidden');
            stickyNav.classList.add('hidden'); // 回首頁時隱藏膠囊選單
            headerTitle.textContent = '裝備清單小幫手';
        }

        // 切換到清單詳細頁
        function showDetail(categoryId) {
            currentCategory = categoryId;
            homeView.classList.add('hidden');
            detailView.classList.remove('hidden');
            detailView.classList.add('fade-in');
            backBtn.classList.remove('hidden');
            stickyNav.classList.remove('hidden'); // 進入內頁時顯示膠囊選單
            
            // 重新渲染該頁內容
            renderTabs();
            renderGallery();
            
            // 修改：切換時自動回到頂部 (改為讓手機窗格回到頂部)
            document.getElementById('app-container').scrollTo({ top: 0, behavior: 'smooth' });
        }

        backBtn.addEventListener('click', showHome);

        // --- 3. 渲染雜誌架 (首頁) ---
        function renderRack() {
            rackContainer.innerHTML = '';
            
            // 將資料分組，每列層架放 2 本雜誌 (最後一列可能只有 1 本)
            const itemsPerShelf = 2;
            for (let i = 0; i < equipmentData.length; i += itemsPerShelf) {
                const shelfItems = equipmentData.slice(i, i + itemsPerShelf);
                
                // 建立層架的 HTML 結構
                const shelfDiv = document.createElement('div');
                shelfDiv.className = 'wood-shelf w-full flex justify-evenly items-end pt-8 pb-0 px-2 mb-8 rounded-sm';
                
                shelfItems.forEach(cat => {
                    const magDiv = document.createElement('div');
                    // 設定雜誌的樣式：白色邊框模擬書本邊緣、陰影、點擊事件
                    magDiv.className = 'magazine-item relative w-[42%] bg-white p-0 shadow-[4px_8px_16px_rgba(0,0,0,0.4)] cursor-pointer z-10 rounded-sm border border-gray-100';
                    magDiv.onclick = () => showDetail(cat.id);
                    
                    // 使用該分類的第一張圖作為「雜誌封面」
                    const coverUrl = cat.images[0];
                    
                    magDiv.innerHTML = `
                        <div class="relative w-full aspect-[1/1.414] overflow-hidden rounded-sm bg-gray-100">
                            <!-- 放大 2 倍 (200%) 並對齊左上角，藉此只顯示左上角的 1/4 畫面 -->
                            <img src="${coverUrl}" class="absolute top-0 left-0 w-[201%] h-[201%] max-w-none object-cover object-left-top select-none pointer-events-none" alt="${cat.name}">
                        </div>
                    `;
                    shelfDiv.appendChild(magDiv);
                });
                
                rackContainer.appendChild(shelfDiv);
            }
        }

        // --- 4. 渲染清單詳細頁 ---
        function renderTabs() {
            tabsContainer.innerHTML = '';
            let activeBtn = null; // 新增：用來記錄當下被啟動的按鈕

            equipmentData.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = cat.id === currentCategory;
                btn.className = `snap-start px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all border ${
                    isActive ? 'bg-[#3643ba] text-white border-[#3643ba] shadow-md' : 'bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100 shadow-sm'
                }`;
                btn.textContent = cat.name;
                btn.onclick = () => {
                    currentCategory = cat.id;
                    renderTabs();
                    renderGallery();
                };
                tabsContainer.appendChild(btn);

                // 如果是啟動狀態，就把這個按鈕記下來
                if (isActive) {
                    activeBtn = btn;
                }
            });

            // 新增：讓目前的分類膠囊自動平滑捲動到畫面中間
            if (activeBtn) {
                // 使用 setTimeout 確保按鈕已經顯示在畫面上才進行捲動運算
                setTimeout(() => {
                    activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }, 50);
            }
        }

        function renderGallery() {
            galleryContainer.innerHTML = '';
            const category = equipmentData.find(c => c.id === currentCategory);
            titleElement.textContent = category.name + '清單';

            category.images.forEach((imgUrl) => {
                const imgWrap = document.createElement('div');
                imgWrap.className = 'relative bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden';
                
                const img = document.createElement('img');
                img.src = imgUrl;
                
                // 強制開啟 iOS/瀏覽器 長按選單，支援原生圖片儲存
                img.className = 'w-full h-auto object-cover block select-none';
                img.style.webkitTouchCallout = 'default';

                imgWrap.appendChild(img);
                galleryContainer.appendChild(imgWrap);
            });
        }

        // --- 5. 資訊彈窗邏輯 ---
        const infoModal = document.getElementById('info-modal');
        const infoBackdrop = document.getElementById('info-backdrop');
        const infoContent = document.getElementById('info-content');
        const showInfoBtn = document.getElementById('show-info-btn');
        const closeInfoBtn = document.getElementById('close-info-btn');

        function openInfoModal() {
            infoModal.classList.remove('hidden');
            infoModal.classList.add('flex');
            void infoModal.offsetWidth; 
            infoBackdrop.classList.remove('opacity-0');
            infoContent.classList.remove('scale-95', 'opacity-0');
            infoContent.classList.add('scale-100', 'opacity-100');
        }

        function closeInfoModal() {
            infoBackdrop.classList.add('opacity-0');
            infoContent.classList.remove('scale-100', 'opacity-100');
            infoContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                infoModal.classList.remove('flex');
                infoModal.classList.add('hidden');
            }, 300);
        }

        showInfoBtn.onclick = openInfoModal;
        closeInfoBtn.onclick = closeInfoModal;

        // --- 初始化 ---
        renderRack(); // 渲染雜誌架
        showHome();   // 確保初始狀態顯示首頁

        // 網頁載入後，延遲 0.5 秒自動彈出提示框
        setTimeout(openInfoModal, 500);
    </script>
</body>
</html>
