          code: '8941090',
          brand: 'QUECHUA',
          name: '男款超輕量 12000mm 防水外套',
          price: '2499',
          loadedImg: null,
          loadedQr: null,
          hasCustomImg: false
        }
      ]
    };

    const itemsContainer = document.getElementById('itemsContainer');
    const addItemBtn = document.getElementById('addItemBtn');
    const canvas = document.getElementById('canvasRef');
    const ctx = canvas.getContext('2d');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // 極簡版 init 函數
    async function init() {
      // 1. 第一時間先設定好畫布尺寸並渲染左側 UI，確保畫面絕對不會卡白屏
      setupCanvasSize();
      renderUI();

      try {
        // 2. 只需要等待您內建在 CSS 的 Base64 字體準備好即可
        await document.fonts.ready;
      } catch (err) { 
        console.warn("字體載入提示:", err); 
      } finally {
        // 3. 標記狀態為 true 並開始畫圖，確保能正常使用
        state.isFontLoaded = true;
        if(state.items.length > 0) {
          fetchImageForItem(state.items[0]);
        } else {
          drawCanvas();
        }
      }
    }

    function setupCanvasSize() {
      const width = 794; const height = 1123; const scale = 2;
      canvas.width = width * scale; canvas.height = height * scale;
      canvas.style.width = '100%'; canvas.style.maxWidth = '550px';
      ctx.scale(scale, scale);
    }

    function renderUI() {
      itemsContainer.innerHTML = '';
      state.items.forEach((item, index) => {
        const itemHtml = `
          <div class="p-4 border border-gray-300 rounded-xl bg-gray-50 relative group">
            <!-- ★ 頂部控制列：將標號與刪除按鈕放在同一個 flex 容器內，保證絕對水平置中對齊 ★ -->
            <div class="flex justify-between items-center mb-3">
              
              <!-- 左側：標號 -->
              <span class="bg-[#3643BA] text-white text-xs font-bold px-2 py-1 rounded">No. ${index + 1}</span>
              
              <!-- 右側：刪除按鈕 (依然保留滑鼠移過去才顯示的特效) -->
              <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                <button type="button" onclick="removeItem(${item.id})" title="刪除商品" class="w-6 h-6 text-gray-400 hover:text-red-500 bg-white hover:bg-red-50 rounded border border-gray-200 shadow-sm transition flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>

            </div>
            <div class="flex flex-col gap-3">
	       <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">商品貨號（Model Code）</label>
                
<div class="flex gap-2 items-center">
                  
                  <div class="relative flex-1 min-w-0">
                    <input type="text" onchange="updateItem(${item.id}, 'code', this.value)" value="${item.code}" class="w-full pl-3 pr-8 h-[34px] border border-gray-300 rounded focus:ring-1 focus:ring-[#3643BA] outline-none text-sm transition" placeholder="商品貨號" />
                    
                    <button type="button" onclick="startScanner(${item.id})" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#3643BA] p-1 transition flex items-center justify-center cursor-pointer" title="掃描 QR Code">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2" /><path d="M17 3h2a2 2 0 0 1 2 2v2" /><path d="M21 17v2a2 2 0 0 1-2 2h-2" /><path d="M7 21H5a2 2 0 0 1-2-2v-2" /><path d="M3 12h18" /></svg>
                    </button>
                  </div>

                  ${item.hasCustomImg ? `
                    <button type="button" onclick="removeCustomImage(${item.id})" class="shrink-0 bg-red-50 hover:bg-red-100 text-red-600 text-[11px] font-bold h-[34px] px-2.5 rounded border border-red-200 transition flex items-center justify-center gap-1 shadow-sm">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                      取消自訂
                    </button>
                  ` : `
                    <label class="shrink-0 cursor-pointer bg-gray-100 hover:bg-gray-200 text-gray-600 text-[11px] font-bold h-[34px] px-2.5 rounded border border-gray-300 transition flex items-center justify-center gap-1 shadow-sm">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                      自訂圖片<input type="file" class="hidden" accept="image/*" onchange="uploadCustomImage(${item.id}, this)">
                    </label>
                  `}
                  
                </div> <p class="text-gray-400 text-[11px] font-medium mt-1 tracking-wide">※ 若無法自動帶入圖片或圖片錯誤，請改以手動上傳圖片</p>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">品牌名稱</label>
                <input id="input-brand-${item.id}" type="text" oninput="this.value = this.value.toUpperCase(); updateItem(${item.id}, 'brand', this.value)" value="${item.brand.toUpperCase()}" class="w-full px-3 py-1.5 border border-gray-300 rounded focus:ring-1 focus:ring-[#3643BA] outline-none text-sm transition uppercase brand-input-font" />
                <p id="warning-brand-${item.id}" class="text-red-500 text-[11px] font-bold mt-1 hidden tracking-wide">⚠️ 品牌名稱過長，可能會遮擋到圖片！</p>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">商品名稱</label>
                <input id="input-name-${item.id}" type="text" oninput="updateItem(${item.id}, 'name', this.value)" value="${item.name}" class="w-full px-3 py-1.5 border border-gray-300 rounded focus:ring-1 focus:ring-[#3643BA] outline-none text-sm font-medium transition" />
                <p id="warning-name-${item.id}" class="text-red-500 text-[11px] font-bold mt-1 hidden tracking-wide">⚠️ 商品名稱過長，可能會遮擋到圖片！</p>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">價格（TWD）</label>
                <input type="number" oninput="updateItem(${item.id}, 'price', this.value)" value="${item.price}" class="w-full px-3 py-1.5 border border-gray-300 rounded focus:ring-1 focus:ring-[#3643BA] outline-none text-lg font-black tracking-tighter" />
              </div>
            </div>
          </div>
        `;
        itemsContainer.insertAdjacentHTML('beforeend', itemHtml);
      });
      addItemBtn.disabled = state.items.length >= 8;
      addItemBtn.classList.toggle('opacity-50', state.items.length >= 8);
    }

    window.updateItem = (id, field, value) => {
      const item = state.items.find(i => i.id === id);
      if (item) {
        item[field] = value;
        if (field === 'code') { item.hasCustomImg = false; renderUI(); fetchImageForItem(item); }
        else drawCanvas();
      }
    };

    window.removeItem = (id) => { state.items = state.items.filter(i => i.id !== id); renderUI(); drawCanvas(); };
    window.removeCustomImage = (id) => { const item = state.items.find(i => i.id === id); if (item) { item.hasCustomImg = false; renderUI(); fetchImageForItem(item); } };
    window.uploadCustomImage = (id, input) => {
      const file = input.files[0]; if (!file) return;
      const item = state.items.find(i => i.id === id); if (!item) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => { item.loadedImg = img; item.hasCustomImg = true; renderUI(); drawCanvas(); };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.toggleYellowBg = (isChecked) => {
      state.showYellowBg = isChecked;
      drawCanvas(); // 切換狀態後，立刻重新繪製畫布！
    };
    
    let html5QrCode;
    let currentScanItemId = null;

    window.startScanner = (id) => {
      currentScanItemId = id;
      const modal = document.getElementById('scannerModal');
      modal.classList.remove('hidden');

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("qr-reader");
      }

      // 啟動攝影機，優先使用手機後置鏡頭
      html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText, decodedResult) => {
          // ★★★ 成功掃描時的動作 ★★★
          // 使用 Regex 擷取網址裡的 6~8 碼數字 (Model Code)
          const match = decodedText.match(/\d{6,8}/);
          if (match) {
            const modelCode = match[0];
            // 帶入貨號並自動觸發更新與抓圖！
            updateItem(currentScanItemId, 'code', modelCode);
            // 抓到後自動關閉掃描視窗
            closeScanner();
          } else {
            alert("在掃描的內容中找不到類似貨號的數字！\n內容: " + decodedText);
          }
        },
        (errorMessage) => {
          // 掃描過程中的背景錯誤 (略過不處理，讓它繼續掃)
        }
      ).catch((err) => {
        console.error("相機啟動失敗", err);
        alert("無法啟動相機！請確認已允許瀏覽器使用相機，且網頁為 https 加密連線。");
        closeScanner();
      });
    };

    window.closeScanner = () => {
      document.getElementById('scannerModal').classList.add('hidden');
      // 停止攝影機以節省效能
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().catch(err => console.error("無法停止相機", err));
      }
    };

    // 補回：新增商品的點擊事件邏輯
    addItemBtn.addEventListener('click', () => {
      if (state.items.length >= 8) return;
      
      const newItem = {
        id: itemIdCounter++,
        code: '8919861', 
        brand: 'QUECHUA',
        name: '輕量登山健行鞋 MH500 LIGHT',
        price: '2499',
        loadedImg: null,
        loadedQr: null,
        hasCustomImg: false
      };
      state.items.push(newItem);
      renderUI();
      fetchImageForItem(newItem);
    });

    async function fetchImageForItem(item) {
      if (!item.code) { item.loadedImg = null; item.loadedQr = null; drawCanvas(); return; }
      loadingOverlay.classList.remove('hidden');
      const imgUrl = `https://wsrv.nl/?url=${encodeURIComponent(`https://product-picture.decathlon.cn/model/${item.code}.jpg?f=1000`)}`;
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=000000&bgcolor=FFFFFF&data=${encodeURIComponent(`https://www.decathlon.tw/${item.code}/1769`)}`;
      const [img, qr] = await Promise.all([loadImage(imgUrl), loadImage(qrUrl)]);
      item.loadedImg = img; item.loadedQr = qr;
      loadingOverlay.classList.add('hidden');
      drawCanvas();
    }

    function loadImage(src) { return new Promise(r => { const i = new Image(); i.crossOrigin="anonymous"; i.onload=()=>r(i); i.onerror=()=>r(null); i.src=src; }); }

    function drawCanvas() {
      if (!state.isFontLoaded) return;
      const width = 794; const height = 1123; const cellW = width / 2; const cellH = height / 4;
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, width, height);
    
      for (let i = 0; i < 8; i++) {
        const item = state.items[i]; if (!item) continue;
        const x = (i % 2) * cellW; const y = Math.floor(i / 2) * cellH;
        const rightEdge = x + cellW - 20;

        if (item.loadedImg) {
          const tw = 140; const th = 140;
          const s = Math.min(tw / item.loadedImg.width, th / item.loadedImg.height);
          const dw = item.loadedImg.width * s; const dh = item.loadedImg.height * s;
          ctx.drawImage(item.loadedImg, x + 16 + (tw - dw)/2, y + (cellH / 2) - 125 + (th - dh)/2, dw, dh);
        }

        ctx.textAlign = 'right'; ctx.fillStyle = '#000';
        ctx.font = '400 14px "Decathlon", Inter, "Noto Sans TC", sans-serif';
        if ('letterSpacing' in ctx) ctx.letterSpacing = "-0.48px";
        const brandText = (item.brand || "").toUpperCase();
        const brandW = ctx.measureText(brandText).width;
        const maxAllowedBrandWidth = 208;
        
        const warningBrandEl = document.getElementById(`warning-brand-${item.id}`);
        const inputBrandEl = document.getElementById(`input-brand-${item.id}`);
        if (warningBrandEl && inputBrandEl) {
          if (brandW > maxAllowedBrandWidth) {
            warningBrandEl.classList.remove('hidden');
            inputBrandEl.classList.remove('border-gray-300', 'focus:ring-[#3643BA]');
            inputBrandEl.classList.add('border-red-500', 'focus:ring-red-500');
          } else {
            warningBrandEl.classList.add('hidden');
            inputBrandEl.classList.remove('border-red-500', 'focus:ring-red-500');
            inputBrandEl.classList.add('border-gray-300', 'focus:ring-[#3643BA]');
          }
        }
        
        ctx.fillText(brandText, rightEdge - 1, y + 32);
        if ('letterSpacing' in ctx) ctx.letterSpacing = "0px";

        ctx.font = '500 14px "Decathlon VF", Inter, "Noto Sans TC", sans-serif';
        const nameText = item.name || "";
        const nameW = ctx.measureText(nameText).width;
        const maxAllowedNameWidth = 208;
        
        const warningNameEl = document.getElementById(`warning-name-${item.id}`);
        const inputNameEl = document.getElementById(`input-name-${item.id}`);
        if (warningNameEl && inputNameEl) {
          if (nameW > maxAllowedNameWidth) {
            warningNameEl.classList.remove('hidden');
            inputNameEl.classList.remove('border-gray-300', 'focus:ring-[#3643BA]');
            inputNameEl.classList.add('border-red-500', 'focus:ring-red-500');
          } else {
            warningNameEl.classList.add('hidden');
            inputNameEl.classList.remove('border-red-500', 'focus:ring-red-500');
            inputNameEl.classList.add('border-gray-300', 'focus:ring-[#3643BA]');
          }
        }

        ctx.fillText(nameText, rightEdge, y + 52);

        ctx.font = '400 14px "Decathlon VF", Inter, "Noto Sans TC", sans-serif';
        ctx.fillText(item.code, rightEdge, y + 72);

        if (item.loadedQr) ctx.drawImage(item.loadedQr, rightEdge - 68, y + 82, 68, 68);

	// --- 價格計算與繪製區塊 ---
        const priceStr = Number(item.price).toLocaleString();

	// 根據黃底開關決定價格字體大小：開啟黃底時用 90，關閉時用 100
        let ps = state.showYellowBg ? 90 : 100;
        let ts = 40;
        let gap = 2;
        
        ctx.font = `700 ${ts}px "Decathlon VF", Inter, "Noto Sans TC", sans-serif`; 
        let tw = ctx.measureText("TWD").width;
        ctx.font = `700 ${ps}px "Decathlon VF", Inter, "Noto Sans TC", sans-serif`; 
        let pw = ctx.measureText(priceStr).width;
        
        if (pw + gap + tw > 355) {
          const s = 355 / (pw + gap + tw);
          ps = Math.max(Math.floor(ps * s), 20); ts = Math.max(Math.floor(ts * s), 10); gap *= s;
          ctx.font = `700 ${ts}px "Decathlon VF", Inter, "Noto Sans TC", sans-serif`; tw = ctx.measureText("TWD").width;
          ctx.font = `700 ${ps}px "Decathlon VF", Inter, "Noto Sans TC", sans-serif`; pw = ctx.measureText(priceStr).width;
        }

        // ★★★ 1. 繪製固定高度的黃色色塊 ★★★
        const rectHeight = 110; 
        const rectTop = (y + cellH) - rectHeight; 
        const rectWidth = cellW; 
        const rectLeft = x; 

        // 只有在開關開啟 (showYellowBg 為 true) 時才畫黃底
        if (state.showYellowBg) {
          ctx.fillStyle = '#FFCD4E'; 
          ctx.fillRect(rectLeft, rectTop, rectWidth, rectHeight);
        }

        // ★★★ 2. 準備繪製黑色價格文字 ★★★
        ctx.fillStyle = '#000'; // 切換回黑色畫字
        ctx.textAlign = 'left';
        
        // 改回 alphabetic (底部基準線對齊)，這樣 TWD 就會跟數字切齊底部
        ctx.textBaseline = 'alphabetic'; 

        // 測量數字的實際高度 (用來計算置中)
        ctx.font = `700 ${ps}px "Decathlon VF", Inter, "Noto Sans TC", sans-serif`;
        const metrics = ctx.measureText("9,999");
        const ascent = metrics.actualBoundingBoxAscent || (ps * 0.75); 
        const descent = metrics.actualBoundingBoxDescent || 0;

        // 計算置中時的「底部基準線 (BaseY)」
        // 公式：色塊頂部 + (色塊高度 - 文字總高度)/2 + 文字頂部到基準線的距離
	const alignRatio = state.showYellowBg ? 1.45 : 1.5;
        const priceBaseY = rectTop + (rectHeight - (ascent + descent)) / alignRatio + ascent;

        // 繪製價格
        ctx.fillText(priceStr, rightEdge - (pw + gap + tw), priceBaseY);
        
        // 繪製 TWD
        ctx.font = `700 ${ts}px "Decathlon VF", Inter, "Noto Sans TC", sans-serif`; 
        ctx.fillText("TWD", rightEdge - tw, priceBaseY);
      }

      // 畫框線的程式碼
      ctx.strokeStyle = '#000'; ctx.lineWidth = 0.3; ctx.setLineDash([9, 1]);
      ctx.beginPath(); ctx.moveTo(cellW, 0); ctx.lineTo(cellW, height);
      for (let i = 1; i < 4; i++) { ctx.moveTo(0, i * cellH); ctx.lineTo(width, i * cellH); }
      ctx.stroke(); ctx.setLineDash([]);
    }

    document.getElementById('printBtn').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL('image/png', 1.0);
      const html = `<!DOCTYPE html><html><head><title>Print</title><style>@page{size:A4 portrait;margin:0;}body{margin:0;}img{width:100%;max-width:210mm;margin:0 auto;display:block;}</style></head><body><img src="${dataUrl}" onload="setTimeout(()=>window.print(),200)" /></body></html>`;
      const blob = new Blob([html], { type: 'text/html' });
      const win = window.open(URL.createObjectURL(blob), '_blank');
      if (!win) {
        const n = document.getElementById('notification');
        n.innerHTML = "⚠️ 瀏覽器阻擋了彈出視窗，請允許後再試。";
        n.style.transform = 'translate(-50%, 0)';
        setTimeout(() => n.style.transform = 'translate(-50%, -150px)', 5000);
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const btnText = document.getElementById('downloadBtnText');
      const btnLoading = document.getElementById('downloadBtnLoading');
      
      if (btnText && btnLoading) {
        btnText.classList.add('hidden');
        btnLoading.classList.remove('hidden');
      }

      // 給瀏覽器一點時間渲染「處理中...」的文字，再開始繁重的 PDF 轉換工作
      setTimeout(() => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
        pdf.addImage(canvas.toDataURL('image/png', 1.0), 'PNG', 0, 0, 210, 297);
        pdf.save('A7_DP價格.pdf');
        
        if (btnText && btnLoading) {
          btnLoading.classList.add('hidden');
          btnText.classList.remove('hidden');
        }
      }, 50);
    });

    const switchTab = (t) => {
      const isEdit = t === 'edit';
      const tabEdit = document.getElementById('tabEdit');
      const tabPreview = document.getElementById('tabPreview');

      // 編輯內容頁籤切換邏輯 (藍色/灰色 互換)
      tabEdit.classList.toggle('text-[#3643BA]', isEdit);
      tabEdit.classList.toggle('border-b-2', isEdit);
      tabEdit.classList.toggle('border-[#3643BA]', isEdit);
      tabEdit.classList.toggle('text-gray-500', !isEdit);

      // 預覽畫面頁籤切換邏輯 (藍色/灰色 互換)
      tabPreview.classList.toggle('text-[#3643BA]', !isEdit);
      tabPreview.classList.toggle('border-b-2', !isEdit);
      tabPreview.classList.toggle('border-[#3643BA]', !isEdit);
      tabPreview.classList.toggle('text-gray-500', isEdit);

      document.getElementById('panelEdit').classList.toggle('hidden', !isEdit);
      document.getElementById('panelPreview').classList.toggle('hidden', isEdit);
    };
    document.getElementById('tabEdit').onclick = () => switchTab('edit');
    document.getElementById('tabPreview').onclick = () => switchTab('preview');

    window.addEventListener('DOMContentLoaded', init);
  </script>
<div id="scannerModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white p-4 rounded-xl w-full max-w-sm shadow-2xl relative">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-gray-800">掃描商品 QR Code</h3>
        <button onclick="closeScanner()" class="text-gray-400 hover:text-red-500 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <div id="qr-reader" class="w-full rounded overflow-hidden"></div>
      <p class="text-xs text-gray-500 mt-3 text-center">請允許瀏覽器使用您的相機權限，對準條碼即可自動辨識。</p>
    </div>
  </div>
</body>
</html>
